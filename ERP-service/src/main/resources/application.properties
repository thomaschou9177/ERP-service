spring.application.name=ERP-service
# Max size for a single file (e.g., 10MB)
spring.servlet.multipart.max-file-size=10MB

# Max total size for the entire request
spring.servlet.multipart.max-request-size=10MB

# CRITICAL: If a file is larger than 2MB, write it to a temp file on disk
# instead of keeping it in the RAM. This prevents OutOfMemory errors.
spring.servlet.multipart.file-size-threshold=2MB
